image: alpine:latest

pages:
  stage: deploy
  script:
    - mkdir -p public
    # Portal principal (dashboard con Supabase)
    - cp portal/static/index.html public/index.html
    # Landing page en /landing/
    - mkdir -p public/landing
    - cp docs/index.html public/landing/index.html
  artifacts:
    paths:
      - public
  only:
    - master
